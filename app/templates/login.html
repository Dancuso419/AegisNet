{% extends "base.html" %}
{% block title %}Sign In — AegisNet{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 4L42 11V25C42 36 34 43 24 46C14 43 6 36 6 25V11L24 4Z"
              fill="rgba(244,121,32,0.07)" stroke="#f47920" stroke-width="1.6" stroke-linejoin="round"/>
        <circle cx="24" cy="26" r="9" stroke="#f47920" stroke-width="1.6"/>
        <circle cx="24" cy="26" r="3" fill="#f47920"/>
      </svg>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your AegisNet account</p>

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input id="email" name="email" type="email" class="form-input"
               placeholder="you@company.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-input"
               placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-auth">Sign In</button>
    </form>

    <p class="auth-footer">
      No account? <a href="{{ url_for('auth.register') }}" class="link">Create one free</a>
    </p>
  </div>

  <p class="auth-brand-note">AegisNet &mdash; AI-Powered Phishing Intelligence</p>
</div>
{% endblock %}
